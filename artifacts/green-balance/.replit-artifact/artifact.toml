kind = "web"
previewPath = "/"
title = "Green Balance – Klima & Wirtschaft"
version = "1.0.0"
id = "artifacts/green-balance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25780

[services.development]
run = "pnpm --filter @workspace/green-balance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/green-balance", "run", "build" ]
publicDir = "artifacts/green-balance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25780"
BASE_PATH = "/"
